@if (type() === 'image') {
  <img
    [src]="url()"
    [alt]="alt()"
    class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105"
    loading="lazy"
  />
} @else {
  <video
    #videoEl
    [src]="url()"
    class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105"
    muted
    playsinline
    preload="metadata"
    (play)="overlay() && (playOverlay.style.display = 'none') && (pauseOverlay.style.display = 'flex')"
    (pause)="overlay() && (playOverlay.style.display = '') && (pauseOverlay.style.display = 'none')"
    (ended)="overlay() && (playOverlay.style.display = '') && (pauseOverlay.style.display = 'none')"
  ></video>

  <!-- Play overlay (always in DOM; hidden when overlay=false) -->
  <div
    #playOverlay
    class="absolute inset-0 flex items-center justify-center bg-black/30 opacity-0 group-hover:opacity-100 transition-opacity duration-200"
    [style.display]="overlay() ? '' : 'none'"
    (click)="$event.stopPropagation(); videoEl.play()"
  >
    <div class="media-overlay-btn">
      <svg class="w-3.5 h-3.5 text-white ml-0.5" viewBox="0 0 16 16" fill="currentColor">
        <path d="M6.271 5.055a.5.5 0 0 1 .52.038l3.5 2.5a.5.5 0 0 1 0 .814l-3.5 2.5A.5.5 0 0 1 6 10.5v-5a.5.5 0 0 1 .271-.445z" />
      </svg>
    </div>
  </div>

  <!-- Pause overlay (always in DOM; hidden when overlay=false or video paused) -->
  <div
    #pauseOverlay
    class="absolute inset-0 items-center justify-center bg-black/30"
    style="display: none"
    (click)="$event.stopPropagation(); videoEl.pause()"
  >
    <div class="media-overlay-btn">
      <svg class="w-3.5 h-3.5 text-white" viewBox="0 0 16 16" fill="currentColor">
        <path d="M5.5 3.5A1.5 1.5 0 0 1 7 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5zm5 0A1.5 1.5 0 0 1 12 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5z" />
      </svg>
    </div>
  </div>
}
