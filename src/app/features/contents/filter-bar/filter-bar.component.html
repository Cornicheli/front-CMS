<form [formGroup]="form"
      class="flex items-center gap-2"
      style="background: #13131a; border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 9px 12px; margin-bottom: 18px">

  <!-- Search icon -->
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.30)" stroke-width="1.8" style="flex-shrink:0">
    <circle cx="11" cy="11" r="7"/>
    <path d="m20 20-3.5-3.5" stroke-linecap="round"/>
  </svg>

  <!-- Search input -->
  <input
    type="search"
    formControlName="search"
    placeholder="Buscar por nombre, categoría..."
    style="flex:1; background:transparent; border:none; outline:none; color:rgba(255,255,255,0.94); font-family:Geist,system-ui,sans-serif; font-size:12.5px;"
  />

  <!-- Type select -->
  <div class="relative flex-shrink-0">
    <select
      formControlName="type"
      style="appearance:none; -webkit-appearance:none; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:6px; padding:5px 28px 5px 11px; color:rgba(255,255,255,0.55); font-family:Geist,system-ui,sans-serif; font-size:11px; cursor:pointer; outline:none; transition:border-color .12s"
      (mouseenter)="$any($event.target).style.borderColor='rgba(255,255,255,0.11)'"
      (mouseleave)="$any($event.target).style.borderColor='rgba(255,255,255,0.06)'"
    >
      <option value="" style="background:#13131a">Todos los tipos</option>
      <option value="image" style="background:#13131a">Imagen</option>
      <option value="video" style="background:#13131a">Video</option>
    </select>
    <svg class="absolute pointer-events-none" style="right:8px; top:50%; transform:translateY(-50%)" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.30)" stroke-width="2">
      <path d="m6 9 6 6 6-6"/>
    </svg>
  </div>

  <!-- Category select -->
  <div class="relative flex-shrink-0">
    <select
      formControlName="category_id"
      style="appearance:none; -webkit-appearance:none; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:6px; padding:5px 28px 5px 11px; color:rgba(255,255,255,0.55); font-family:Geist,system-ui,sans-serif; font-size:11px; cursor:pointer; outline:none; transition:border-color .12s"
      (mouseenter)="$any($event.target).style.borderColor='rgba(255,255,255,0.11)'"
      (mouseleave)="$any($event.target).style.borderColor='rgba(255,255,255,0.06)'"
    >
      <option value="" style="background:#13131a">Todas las categorías</option>
      @for (cat of categories(); track cat.id) {
        <option [value]="cat.id" style="background:#13131a">{{ cat.name }}</option>
      }
    </select>
    <svg class="absolute pointer-events-none" style="right:8px; top:50%; transform:translateY(-50%)" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.30)" stroke-width="2">
      <path d="m6 9 6 6 6-6"/>
    </svg>
  </div>

  <!-- Archive toggle -->
  <button
    type="button"
    (click)="toggleArchived()"
    class="flex items-center gap-1.5 flex-shrink-0 transition-all"
    style="padding:5px 11px; border-radius:6px; font-family:Geist,system-ui,sans-serif; font-size:11px; cursor:pointer"
    [style.background]="showArchived() ? 'rgba(251,191,36,0.12)' : 'rgba(255,255,255,0.03)'"
    [style.border]="showArchived() ? '1px solid rgba(251,191,36,0.28)' : '1px solid rgba(255,255,255,0.06)'"
    [style.color]="showArchived() ? '#fbbf24' : 'rgba(255,255,255,0.55)'"
  >
    Archivados
  </button>

  <!-- Clear -->
  @if (form.value.search || form.value.type || form.value.category_id || showArchived()) {
    <button
      type="button"
      (click)="clearFilters()"
      style="flex-shrink:0; padding:5px 11px; border-radius:6px; background:transparent; border:1px solid transparent; color:rgba(255,255,255,0.34); font-family:Geist,system-ui,sans-serif; font-size:11px; cursor:pointer; transition:color .12s"
      (mouseenter)="$any($event.target).style.color='rgba(255,255,255,0.60)'"
      (mouseleave)="$any($event.target).style.color='rgba(255,255,255,0.34)'"
    >
      Limpiar
    </button>
  }
</form>
