<div class="flex-shrink-0 bg-white border-b border-slate-200 px-5 py-2.5">
  <form [formGroup]="form" class="flex items-center gap-2.5 flex-wrap">

    <!-- Search -->
    <div class="relative flex-1 min-w-40">
      <svg
        class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-400 pointer-events-none"
        viewBox="0 0 16 16" fill="currentColor"
      >
        <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.099zm-5.242 1.656a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/>
      </svg>
      <input
        type="search"
        formControlName="search"
        placeholder="Buscar por nombre..."
        class="w-full pl-8 pr-3 py-1.5 text-xs border border-slate-200 rounded-lg bg-slate-50
               focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent
               placeholder-slate-400 text-slate-700 transition-all"
      />
    </div>

    <!-- Type -->
    <select
      formControlName="type"
      class="px-2.5 py-1.5 text-xs border border-slate-200 rounded-lg bg-slate-50
             focus:outline-none focus:ring-2 focus:ring-brand-500 text-slate-700"
    >
      <option value="">Todos los tipos</option>
      <option value="image">Imagen</option>
      <option value="video">Video</option>
    </select>

    <!-- Category -->
    <select
      formControlName="category_id"
      class="px-2.5 py-1.5 text-xs border border-slate-200 rounded-lg bg-slate-50
             focus:outline-none focus:ring-2 focus:ring-brand-500 text-slate-700"
    >
      <option value="">Todas las categorías</option>
      @for (cat of categories(); track cat.id) {
        <option [value]="cat.id">{{ cat.name }}</option>
      }
    </select>

    <!-- Clear -->
    <button
      type="button"
      (click)="clearFilters()"
      class="px-2.5 py-1.5 text-xs text-slate-500 hover:text-slate-700 hover:bg-slate-100 rounded-lg transition-colors"
    >
      Limpiar
    </button>
  </form>
</div>
