<aside class="w-56 flex-shrink-0 flex flex-col bg-[#0d1424] border-r border-slate-800/60 h-full">

  <!-- Brand -->
  <div class="flex items-center gap-2.5 h-14 px-4 border-b border-slate-800/60 flex-shrink-0">
    <div class="w-7 h-7 rounded-lg bg-brand-500 flex items-center justify-center flex-shrink-0">
      <svg class="w-3.5 h-3.5 text-white" viewBox="0 0 16 16" fill="currentColor">
        <path d="M0 2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4.414a1 1 0 0 0-.707.293L.854 15.146A.5.5 0 0 1 0 14.793V2z"/>
      </svg>
    </div>
    <span class="text-white font-semibold text-sm tracking-tight truncate">LatinAd CMS</span>
  </div>

  <!-- Scrollable nav -->
  <div class="flex-1 overflow-y-auto py-3 px-2 space-y-0.5 scrollbar-thin">

    <!-- ── SECTION: ZONAS ── -->
    <p class="px-3 pt-1 pb-2 text-[10px] font-semibold tracking-widest text-slate-500 uppercase">
      Zonas
    </p>

    @for (zone of zones(); track zone.id) {
      <button
        type="button"
        (click)="activeZoneId() === zone.id ? clearZone() : selectZone(zone.id)"
        class="w-full flex items-center gap-2.5 px-3 py-1.5 rounded-lg text-xs transition-all duration-150"
        [class]="activeZoneId() === zone.id
          ? 'font-semibold text-white ring-1'
          : 'text-slate-400 hover:bg-slate-800/60 hover:text-slate-200'"
        [style.background-color]="activeZoneId() === zone.id ? zone.color + '18' : ''"
        [style.ring-color]="activeZoneId() === zone.id ? zone.color + '40' : ''"
        [style.box-shadow]="activeZoneId() === zone.id ? '0 0 14px -4px ' + zone.color + '60' : ''"
      >
        <span
          class="flex-shrink-0 w-2 h-2 rounded-full transition-all"
          [style.background-color]="zone.color"
          [style.box-shadow]="activeZoneId() === zone.id ? '0 0 6px 1px ' + zone.color : 'none'"
        ></span>
        <span class="flex-1 truncate text-left">{{ zone.name }}</span>
        <span class="flex-shrink-0 text-[10px] tabular-nums opacity-50">{{ zone.screenCount }}</span>
      </button>
    }

    <!-- ── SECTION: CONTENIDOS (dropdown) ── -->
    <div class="pt-3">
      <button
        type="button"
        (click)="foldersExpanded.set(!foldersExpanded())"
        class="w-full flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs text-slate-400 hover:bg-slate-800/60 hover:text-slate-200 transition-all duration-150"
      >
        <!-- Folder icon -->
        <svg class="flex-shrink-0 w-3.5 h-3.5 text-slate-500" viewBox="0 0 16 16" fill="currentColor">
          <path d="M1.75 1A1.75 1.75 0 0 0 0 2.75v10.5C0 14.216.784 15 1.75 15h12.5A1.75 1.75 0 0 0 16 13.25v-8.5A1.75 1.75 0 0 0 14.25 3H7.5a.25.25 0 0 1-.2-.1l-.9-1.2C6.07 1.26 5.55 1 5 1H1.75Z"/>
        </svg>
        <span class="flex-1 text-left font-medium tracking-wide uppercase text-[10px] text-slate-500">Contenidos</span>
        <!-- Chevron -->
        <svg
          class="flex-shrink-0 w-3 h-3 text-slate-600 transition-transform duration-150"
          [class.rotate-90]="foldersExpanded()"
          viewBox="0 0 6 10" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round"
        >
          <path d="M1 1l4 4-4 4"/>
        </svg>
      </button>

      @if (foldersExpanded()) {
        <div class="mt-1 space-y-0.5">

          <!-- "Todos" option -->
          <button
            type="button"
            (click)="clearFolders()"
            class="w-full flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs transition-all duration-150 mb-0.5"
            [class]="activeFolderId() === null && activeZoneId() === null
              ? 'bg-brand-500/15 text-brand-400 font-medium shadow-[0_0_12px_-3px] shadow-brand-500/30 ring-1 ring-brand-500/20'
              : 'text-slate-400 hover:bg-slate-800/60 hover:text-slate-200'"
          >
            <svg class="flex-shrink-0 w-3.5 h-3.5" viewBox="0 0 16 16" fill="currentColor">
              <path d="M1 2.5A1.5 1.5 0 0 1 2.5 1h3A1.5 1.5 0 0 1 7 2.5v3A1.5 1.5 0 0 1 5.5 7h-3A1.5 1.5 0 0 1 1 5.5v-3zm8 0A1.5 1.5 0 0 1 10.5 1h3A1.5 1.5 0 0 1 15 2.5v3A1.5 1.5 0 0 1 13.5 7h-3A1.5 1.5 0 0 1 9 5.5v-3zm-8 8A1.5 1.5 0 0 1 2.5 9h3A1.5 1.5 0 0 1 7 10.5v3A1.5 1.5 0 0 1 5.5 15h-3A1.5 1.5 0 0 1 1 13.5v-3zm8 0A1.5 1.5 0 0 1 10.5 9h3A1.5 1.5 0 0 1 15 10.5v3A1.5 1.5 0 0 1 13.5 15h-3A1.5 1.5 0 0 1 9 13.5v-3z"/>
            </svg>
            <span class="text-xs">Todos los contenidos</span>
          </button>

          <!-- Folder tree -->
          @if (folderTree().length > 0) {
            <div class="space-y-0.5">
              @for (node of folderTree(); track node.id) {
                <app-sidebar-folder
                  [node]="node"
                  [selectedId]="selectedFolderId()"
                  [depth]="0"
                  (select)="selectFolder($event)"
                />
              }
            </div>
          } @else {
            <p class="px-3 py-2 text-xs text-slate-500 italic">Sin carpetas</p>
          }
        </div>
      }
    </div>

  </div>
</aside>
