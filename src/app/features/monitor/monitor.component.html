<div class="flex h-screen overflow-hidden bg-slate-950">
  <!-- ══════════════════ SIDEBAR ══════════════════ -->
  <app-monitor-sidebar
    [zones]="zones"
    [folders]="contentService.folders()"
    [activeZoneId]="activeZoneId()"
    [activeFolderId]="activeFolderId()"
    (zoneSelected)="onZoneSelected($event)"
    (folderSelected)="onFolderSelected($event)"
  />

  <!-- ══════════════════ MAIN ══════════════════ -->
  <div class="flex-1 flex flex-col overflow-hidden min-w-0">

    <!-- TOPBAR -->
    <header class="h-14 flex-shrink-0 flex items-center gap-3 px-5
                   bg-slate-900/95 backdrop-blur-xl border-b border-slate-800/60
                   shadow-[0_1px_0_0_rgba(255,255,255,0.03)]">

      <!-- Back to Dashboard — visible, branded -->
      <a
        routerLink="/dashboard"
        class="flex-shrink-0 flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium
               text-slate-400 hover:text-slate-100
               bg-slate-800/60 hover:bg-slate-700/60
               border border-slate-700/60 hover:border-slate-600/60
               transition-all duration-150"
      >
        <svg class="w-3.5 h-3.5" viewBox="0 0 16 16" fill="currentColor">
          <path fill-rule="evenodd"
            d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
        </svg>
        Dashboard
      </a>

      <div class="flex-1 min-w-0">
        <h1 class="text-sm font-semibold text-slate-100 truncate tracking-tight">
          Centro de Monitoreo
          <span class="ml-2 text-slate-500 font-normal text-xs">{{ breadcrumb() }}</span>
        </h1>
      </div>

      <!-- Theme toggle -->
      <button
        type="button"
        (click)="themeService.toggle()"
        class="flex-shrink-0 p-1.5 rounded-md text-slate-500 hover:text-slate-300 hover:bg-slate-800 transition-colors"
        [title]="themeService.isDark() ? 'Modo claro' : 'Modo oscuro'"
      >
        @if (themeService.isDark()) {
          <svg class="w-4 h-4" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8z"/>
          </svg>
        } @else {
          <svg class="w-4 h-4" viewBox="0 0 16 16" fill="currentColor">
            <path d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z"/>
          </svg>
        }
      </button>

      <!-- Grid / List toggle -->
      <div class="flex bg-slate-900 border border-slate-800/80 rounded-lg p-0.5 gap-0.5 flex-shrink-0">
        <button
          type="button"
          (click)="onViewModeChange('grid')"
          class="flex items-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-medium transition-all duration-150"
          [class]="viewMode() === 'grid'
            ? 'bg-brand-500/20 text-brand-300'
            : 'text-slate-500 hover:text-slate-300'"
        >
          <svg class="w-3.5 h-3.5 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
            <rect x="3" y="3" width="7" height="7" rx="1.5"/>
            <rect x="14" y="3" width="7" height="7" rx="1.5"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5"/>
            <rect x="14" y="14" width="7" height="7" rx="1.5"/>
          </svg>
          Grilla
        </button>
        <button
          type="button"
          (click)="onViewModeChange('list')"
          class="flex items-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-medium transition-all duration-150"
          [class]="viewMode() === 'list'
            ? 'bg-brand-500/20 text-brand-300'
            : 'text-slate-500 hover:text-slate-300'"
        >
          <svg class="w-3.5 h-3.5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
          Lista
        </button>
      </div>
    </header>

    <!-- ── KPI ROW ── -->
    <div class="flex-shrink-0 grid grid-cols-4 gap-3 px-5 py-4 bg-slate-950">

      <!-- Network Status -->
      <div class="relative bg-slate-900/60 backdrop-blur-sm border border-slate-700/50 rounded-2xl px-4 py-3.5 flex items-center gap-3 overflow-hidden shadow-xl">
        <div class="absolute top-0 left-0 right-0 h-0.5 rounded-t-2xl bg-gradient-to-r from-emerald-500 to-teal-400"></div>
        <div class="w-9 h-9 rounded-xl bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center flex-shrink-0">
          <svg class="w-4 h-4 text-emerald-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-xl font-bold text-slate-50 leading-none tabular-nums">{{ kpiNetworkHealth() }}</div>
          <div class="text-[10px] text-slate-500 mt-1 uppercase tracking-wider">Network Online</div>
        </div>
        <span class="flex-shrink-0 text-[10px] font-bold px-2 py-1 rounded-full bg-emerald-500/15 text-emerald-400 border border-emerald-500/30 flex items-center gap-1"
              style="filter: drop-shadow(0 0 6px rgba(52,211,153,0.35))">
          <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse inline-block"></span>
          LIVE
        </span>
      </div>

      <!-- Active Plays -->
      <div class="relative bg-slate-900/60 backdrop-blur-sm border border-slate-700/50 rounded-2xl px-4 py-3.5 flex items-center gap-3 overflow-hidden shadow-xl">
        <div class="absolute top-0 left-0 right-0 h-0.5 rounded-t-2xl bg-gradient-to-r from-brand-500 to-violet-500"></div>
        <div class="w-9 h-9 rounded-xl bg-brand-500/10 border border-brand-500/20 flex items-center justify-center flex-shrink-0">
          <svg class="w-4 h-4 text-brand-400" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-xl font-bold text-slate-50 leading-none tabular-nums">{{ kpiActivePlays() }}</div>
          <div class="text-[10px] text-slate-500 mt-1 uppercase tracking-wider">Active Plays</div>
        </div>
      </div>

      <!-- Revenue -->
      <div class="relative bg-slate-900/60 backdrop-blur-sm border border-slate-700/50 rounded-2xl px-4 py-3.5 flex items-center gap-3 overflow-hidden shadow-xl">
        <div class="absolute top-0 left-0 right-0 h-0.5 rounded-t-2xl bg-gradient-to-r from-amber-500 to-orange-400"></div>
        <div class="w-9 h-9 rounded-xl bg-amber-500/10 border border-amber-500/20 flex items-center justify-center flex-shrink-0">
          <svg class="w-4 h-4 text-amber-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="1" x2="12" y2="23"/>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-xl font-bold text-slate-50 leading-none tabular-nums">{{ kpiRevenue() }}</div>
          <div class="text-[10px] text-slate-500 mt-1 uppercase tracking-wider">Revenue / Mes</div>
        </div>
        <span class="flex-shrink-0 text-[10px] font-bold px-2 py-1 rounded-full bg-amber-500/10 text-amber-400 border border-amber-500/20">+12%</span>
      </div>

      <!-- Total Reach -->
      <div class="relative bg-slate-900/60 backdrop-blur-sm border border-slate-700/50 rounded-2xl px-4 py-3.5 flex items-center gap-3 overflow-hidden shadow-xl">
        <div class="absolute top-0 left-0 right-0 h-0.5 rounded-t-2xl bg-gradient-to-r from-violet-500 to-fuchsia-400"></div>
        <div class="w-9 h-9 rounded-xl bg-violet-500/10 border border-violet-500/20 flex items-center justify-center flex-shrink-0">
          <svg class="w-4 h-4 text-violet-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-xl font-bold text-slate-50 leading-none tabular-nums">{{ kpiReach() }}</div>
          <div class="text-[10px] text-slate-500 mt-1 uppercase tracking-wider">Total Reach</div>
        </div>
        <span class="flex-shrink-0 text-[10px] font-bold px-2 py-1 rounded-full bg-violet-500/10 text-violet-400 border border-violet-500/20">CPM 3.8</span>
      </div>
    </div>

    <!-- ── SCROLLABLE CONTENT ── -->
    <div class="flex-1 overflow-y-auto px-5 pb-8 space-y-4 bg-slate-950 scrollbar-thin">
      <app-monitor-map
        [zones]="zones"
        [activeZoneId]="activeZoneId()"
        [contents]="contentService.contents()"
        (zoneClicked)="onZoneSelected($event)"
      />
      <app-monitor-grid
        [contents]="filteredContents()"
        [viewMode]="viewMode()"
        [categories]="contentService.categories()"
        (viewModeChange)="onViewModeChange($event)"
      />
    </div>
  </div>
</div>
